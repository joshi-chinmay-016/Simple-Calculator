<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A sleek, modern calculator built with vanilla HTML, CSS, and JavaScript. Supports basic arithmetic operations with a beautiful glassmorphism design.">
    <link rel="stylesheet" href="style.css">
    <title>Calculator</title>
</head>
<body>
    <div class="calculator" role="application" aria-label="Calculator">
        <input
            type="text"
            placeholder="0"
            id="inputBox"
            aria-label="Calculator display"
            readonly
        >
        <div class="btn-row">
            <button class="operator btn-wide" id="btn-ac">AC</button>
            <button class="operator" id="btn-del">DEL</button>
            <button class="operator" id="btn-percent">%</button>
            <button class="operator" id="btn-divide">/</button>
        </div>
        <div class="btn-row">
            <button id="btn-7">7</button>
            <button id="btn-8">8</button>
            <button id="btn-9">9</button>
            <button class="operator" id="btn-multiply">*</button>
        </div>
        <div class="btn-row">
            <button id="btn-4">4</button>
            <button id="btn-5">5</button>
            <button id="btn-6">6</button>
            <button class="operator" id="btn-add">+</button>
        </div>
        <div class="btn-row">
            <button id="btn-1">1</button>
            <button id="btn-2">2</button>
            <button id="btn-3">3</button>
            <button class="operator" id="btn-subtract">-</button>
        </div>
        <div class="btn-row">
            <button id="btn-00">00</button>
            <button id="btn-0">0</button>
            <button class="op" id="btn-dot">.</button>
            <button class="equalbtn" id="btn-equals">=</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
